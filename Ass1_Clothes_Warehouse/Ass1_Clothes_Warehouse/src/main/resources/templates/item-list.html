<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <title>Items List</title>
    <link rel="stylesheet" th:href="@{/styles/styles.css}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='items')}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/header :: header(pageTitle='Item List')}"></div>
        <div class="container" style="padding-top: 20px;">

            <div th:if="${items != null}">
                <!-- Filter Bar -->
                <div class="filter-bar" style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center;">
                        <label for="brandFilter" style="margin: 0; margin-right: 15px; font-weight: 600;">Filter by
                            Brand:</label>
                        <div class="filter-select-wrapper">
                            <select id="brandFilter" class="filter-select" onchange="window.location.href=this.value">
                                <option value="/items" th:selected="${selectedBrand == 'All'}">All Brands</option>
                                <option value="/items/brand/Nike" th:selected="${selectedBrand == 'Nike'}">Nike</option>
                                <option value="/items/brand/Adidas" th:selected="${selectedBrand == 'Adidas'}">Adidas
                                </option>
                                <option value="/items/brand/Levi's" th:selected="${selectedBrand == 'Levi''s'}">Levi's
                                </option>
                                <option value="/items/brand/The North Face"
                                    th:selected="${selectedBrand == 'The North Face'}">The North Face</option>
                                <option value="/items/brand/Puma" th:selected="${selectedBrand == 'Puma'}">Puma</option>
                                <option value="/items/brand/Under Armour"
                                    th:selected="${selectedBrand == 'Under Armour'}">
                                    Under Armour</option>
                            </select>
                        </div>
                    </div>
                    <div sec:authorize="hasAnyRole('ADMIN', 'WAREHOUSE_EMPLOYEE')">
                        <a th:href="@{/add-item}" class="btn-new-item"
                            style="text-decoration: none; background-color: #0D9488; color: white; padding: 10px 20px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; transition: background-color 0.2s;">
                            <i class="fas fa-plus" style="margin-right: 5px;"></i> New Item
                        </a>
                    </div>
                </div>

                <div class="card" style="padding: 0; max-width: 100%; overflow: hidden;">
                    <div class="table-responsive">
                        <table class="dashboard-table" th:if="${not #lists.isEmpty(items)}" style="margin-bottom: 0;">
                            <thead>
                                <tr>
                                    <th style="width: 80px;">ID</th>
                                    <th style="width: 80px; text-align: center;">Image</th>
                                    <th>Name</th>
                                    <th>Brand</th>
                                    <th>Year</th>
                                    <th>Price</th>
                                    <th style="text-align: right;">Qty</th>
                                    <th sec:authorize="hasRole('ADMIN')" style="width: 100px; text-align: right;">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${items}">
                                    <td th:text="${item.id}"></td>
                                    <td style="text-align: center; padding: 10px;">
                                        <!-- Cyclical thumbnails based on ID -->
                                        <img th:src="@{'/images/handbag-' + (${item.id % 3 + 1}) + '.png'}"
                                            alt="Item Thumbnail" class="product-thumbnail" style="margin: 0 auto;">
                                    </td>
                                    <td th:text="${item.name}" style="font-weight: 500; color: #334155;"></td>
                                    <td th:text="${item.brand}"></td>
                                    <td th:text="${item.year}"></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)}"
                                        style="color: #0D9488; font-weight: 600;"></td>
                                    <td th:text="${item.quantity}" style="text-align: right; font-weight: 500;"></td>
                                    <td sec:authorize="hasRole('ADMIN')" style="text-align: right;">
                                        <div class="dropdown">
                                            <button class="dropbtn"
                                                style="padding: 6px 12px; font-size: 0.85rem; border-radius: 4px;">Actions
                                                &#8942;</button>
                                            <div class="dropdown-content">
                                                <a th:href="@{/items/edit/{id}(id=${item.id})}">Edit</a>
                                                <a
                                                    th:href="@{/admin/request-item(itemName=${item.name}, brand=${item.brand})}">Request</a>
                                                <form th:action="@{/admin/items/delete/{id}(id=${item.id})}"
                                                    method="post"
                                                    onsubmit="return confirm('Are you sure you want to delete this item?');">
                                                    <button type="submit" class="delete-btn"
                                                        style="width: 100%; text-align: left;">Delete</button>
                                                </form>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(items)}" class="alert alert-info" style="margin-top: 20px;">
                    <p>No items found. Please try a different filter.</p>
                </div>

                <!-- Pagination UI -->
                <div class="pagination" th:if="${page != null}">
                    <a th:href="@{/items(page=${page.number - 1}, size=${page.size}, sortBy=${param.sortBy})}"
                        th:if="${page.hasPrevious()}">&laquo;</a>

                    <!-- Simple current page indicator -->
                    <span th:text="${page.number + 1}"></span>

                    <a th:href="@{/items(page=${page.number + 1}, size=${page.size}, sortBy=${param.sortBy})}"
                        th:if="${page.hasNext()}">&raquo;</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
