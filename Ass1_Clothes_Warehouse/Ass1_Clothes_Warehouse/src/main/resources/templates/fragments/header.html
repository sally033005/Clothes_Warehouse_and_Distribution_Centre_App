<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<body>
    <header class="dashboard-header" th:fragment="header">
        <h2 th:text="${pageTitle ?: 'Dashboard'}">Dashboard</h2>
        <div class="header-right">
            <span class="welcome-text">Welcome, <span th:text="${#authentication.name}">User</span></span>
            <form th:action="@{/logout}" method="post" class="logout-form-dashboard">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </header>
</body>

</html>
